<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<script src="assets/js/gate.js"></script>
<title>Captain Login — ULDP 2026 Portal</title>
<meta name="description" content="House Captain login for ULDP 2026.">
<meta name="robots" content="noindex,nofollow">
<link rel="icon" href="favicon.ico?v=2">
<link rel="icon" type="image/png" sizes="48x48" href="favicon-32.png?v=2">
<link rel="apple-touch-icon" href="apple-touch-icon.png?v=2">
<link rel="stylesheet" href="assets/css/styles.css?v=23">
</head>
<body data-page="captain">
<header class="site"></header>

<div class="hero">
  <span class="geo tri-teal" style="left:4%;top:24%"></span>
  <span class="geo dia-yellow" style="right:6%;bottom:18%"></span>
  <div class="wrap">
    <div>
      <p class="eyebrow">House Captains only</p>
      <h1>Captain Login</h1>
      <p class="sub">Sign in to reach the Captain dashboard — submit points claims and follow them through review.</p>
    </div>
    <div class="photo"><img src="assets/img/photos/hero-submit.jpg" alt="CEO Challenge champions celebrating"></div>
  </div>
</div>

<section>
  <div class="wrap">
    <div class="gate" id="gate">
      <div class="lock">🔒</div>
      <h3>Captain access</h3>
      <p style="font-size:.92rem;margin-top:8px">Enter the Captain access code from your briefing. For security, you'll sign in each time you open the portal.</p>
      <div class="pwwrap">
        <input type="password" id="gate-code" placeholder="Access code" autocomplete="off">
        <button type="button" class="pwtog" id="gate-tog" aria-label="Show or hide code">👁</button>
      </div>
      <div class="err" id="gate-err"></div>
      <button class="btn btn-primary" id="gate-btn">Enter dashboard <span class="arr">→</span></button>
    </div>
  </div>
</section>

<footer class="site"></footer>
<script src="assets/js/config.js"></script>
<script src="assets/js/include.js"></script>
<script src="assets/js/main.js"></script>
<script>
(function () {
  document.getElementById("gate-tog").addEventListener("click", function () {
    var i = document.getElementById("gate-code");
    var sh = i.type === "password";
    i.type = sh ? "text" : "password";
    this.textContent = sh ? "🙈" : "👁";
  });
  function enter() {
    var v = document.getElementById("gate-code").value.trim();
    if (v === ULDP.CAPTAIN_CODE) {
      // one-time pass — consumed on the dashboard, so a refresh re-locks
      sessionStorage.setItem("cap-gate", "1");
      location.href = "captain-dashboard.html";
    } else {
      document.getElementById("gate-err").textContent = "That code isn't right — check your Captain briefing.";
    }
  }
  document.getElementById("gate-btn").addEventListener("click", enter);
  document.getElementById("gate-code").addEventListener("keydown", function (e) {
    if (e.key === "Enter") enter();
  });
})();
</script>
</body>
</html>
