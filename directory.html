<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<script src="assets/js/gate.js"></script>
<title>Member Directory — ULDP 2026 Portal</title>
<meta name="description" content="The ULDP 2026 Cohort 16 member directory — meet your cohort.">
<meta name="robots" content="noindex,nofollow">
<link rel="icon" href="favicon.ico?v=2">
<link rel="icon" type="image/png" sizes="48x48" href="favicon-32.png?v=2">
<link rel="apple-touch-icon" href="apple-touch-icon.png?v=2">
<link rel="stylesheet" href="assets/css/styles.css?v=22">
</head>
<body data-page="directory">
<header class="site"></header>

<div class="hero hero-tight">
  <span class="geo tri-teal" style="left:4%;top:30%"></span>
  <span class="geo dia-yellow" style="right:6%;bottom:16%"></span>
  <div class="wrap">
    <div>
      <p class="eyebrow">Cohort 16 · Member directory</p>
      <h1>Meet your cohort</h1>
      <p class="sub">Eighty leaders, four Houses, one network. Search, filter, and get to know the people you'll spend the journey with.</p>
    </div>
  </div>
</div>

<section>
  <div class="wrap">

    <!-- FILTER BAR -->
    <div class="dirbar">
      <input type="search" id="f-search" placeholder="🔍  Search a name, university, interest…" autocomplete="off">
      <div class="dirbar-selects">
        <select id="f-house"><option value="">All Houses</option></select>
        <select id="f-team"><option value="">All Teams</option></select>
        <select id="f-uni"><option value="">All Universities</option></select>
        <select id="f-state"><option value="">All States</option></select>
        <select id="f-field"><option value="">All Fields</option></select>
      </div>
    </div>
    <p class="dircount" id="dir-count"></p>

    <!-- GRID -->
    <div class="dirgrid" id="dir-grid"></div>
    <p class="lead" id="dir-empty" style="display:none;text-align:center;padding:50px 0">No members match these filters.</p>

  </div>
</section>

<!-- PROFILE MODAL -->
<div class="modal" id="dir-modal" aria-hidden="true">
  <div class="modal-backdrop" data-close></div>
  <div class="modal-card" role="dialog" aria-modal="true" id="modal-card"></div>
</div>

<footer class="site"></footer>
<script src="assets/js/config.js"></script>
<script src="assets/js/include.js"></script>
<script src="assets/js/main.js"></script>
<script>
(function () {
  var HOUSES = { visionaries:"Visionaries", builders:"Builders", purpose:"Purpose", connectors:"Connectors" };

  /* ---------- demo roster: generate a full cohort of 80 ---------- */
  function buildDemo(){
    var first=["Aisyah","Irfan","Wei Ling","Arjun","Nura","Jia Hao","Farah","Daniel","Preetha","Hakim","Mei Yan","Suresh","Liyana","Zikri","Yong Sheng","Anand","Balqis","Wai Kit","Divya","Faiz","Hui Min","Rajesh","Syafiq","Xin Yi","Kavya","Amir","Joey","Vimala","Danish","Qistina","Bryan","Shanti","Haziq","Cheng Han","Nadia","Karthik","Elaine","Rizal","Pavithra","Lukas","Iman","Wen Jie","Sofea","Adam","Li Wei","Meera","Hafiz","Jocelyn","Pravin","Tasha"];
    var last=["Rahman","Zulkifli","Tan","Suresh","Kamal","Lim","Idris","Wong","Maniam","Abdullah","Lee","Krishnan","Hashim","Ng","Pillai","Yusof","Chong","Ramasamy","Aziz","Goh","Ismail","Subramaniam","Teh","Bakar","Loh"];
    var unis=["Universiti Malaya","Universiti Kebangsaan Malaysia","Universiti Sains Malaysia","Universiti Putra Malaysia","Universiti Teknologi Malaysia","Universiti Teknologi MARA","International Islamic University","Monash University Malaysia","Taylor's University","Sunway University","Multimedia University","Universiti Utara Malaysia"];
    var states=["Selangor","Kuala Lumpur","Penang","Johor","Perak","Sabah","Sarawak","Negeri Sembilan","Pahang","Kedah","Melaka","Terengganu","Kelantan"];
    var fields=["Computer Science","Mechanical Engineering","Medicine","Business Analytics","Actuarial Science","Civil Engineering","Law","Marketing","Economics","Accounting","Psychology","Design","Data Science","Biotechnology"];
    var inds=["Tech · Venture","Consulting · Finance","Healthcare · Policy","Energy · Manufacturing","Media · Brand","Legal · Human Rights","FinTech · Banking","Public Sector","Education · Social"];
    var perss=["ENTP · Strategist","ISTJ · Anchor","INFJ · Advocate","ESFP · Spark","INTJ · Architect","ISFJ · Protector","ENFJ · Mentor","ENFP · Catalyst","INTP · Analyst","ESTJ · Director"];
    var asks=["startups, hackathons and competitive debate","public health, volunteering and mentoring juniors","case competitions and public speaking","sustainable design and project planning","data storytelling and behavioural economics","content creation and brand strategy","moot court, advocacy and writing","risk modelling, chess and productivity systems"];
    var hobs=["Bouldering, film photography, kopi-hunting","Futsal, mechanical keyboards, nasi lemak runs","Watercolour, hiking, baking sourdough","Stand-up comedy, basketball, vinyl records","Chess, K-drama, crochet","Cycling, badminton, street food tours","Poetry, calligraphy, tea ceremonies","Vlogging, scuba diving, guitar"];
    var roles=["House Captain","Logistics Lead","Wellness Officer","Events MC","Data Steward","Safety Marshal","Documentation Lead","Social Media","Research Lead","Member","Member","Member"];
    var badgePool=["MVP Nominee","Most Improved","Community Star","Best Pitch","Networker","Quant Whiz","Team Player","Voice of Reason","Creative Lead","Insight Award"];
    var houses=["visionaries","builders","purpose","connectors"];
    var s=7; function rnd(){ s=(s*9301+49297)%233280; return s/233280; }
    function pick(a){ return a[Math.floor(rnd()*a.length)]; }
    var out=[];
    for(var i=0;i<80;i++){
      var fnm=first[i % first.length], lnm=pick(last);
      var nb=Math.floor(rnd()*3), badges=[];
      for(var b=0;b<nb;b++){ var bd=pick(badgePool); if(badges.indexOf(bd)===-1) badges.push(bd); }
      out.push({
        full: fnm+" "+lnm, pref: fnm, house: houses[i%4],
        uni: pick(unis), state: pick(states), field: pick(fields),
        industries: pick(inds), team: "Team "+(1+(i%8)), social:"https://linkedin.com",
        roles: pick(roles), badges: badges, personality: pick(perss),
        askme: "Ask me about "+pick(asks)+".", hobbies: pick(hobs)
      });
    }
    return out;
  }
  var DEMO = buildDemo();
  var DATA = [];

  function esc(s){ return String(s==null?"":s).replace(/[&<>"]/g,function(c){return{"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c]}); }
  function initials(name){ return String(name||"?").trim().split(/\s+/).slice(0,2).map(function(w){return w[0]}).join("").toUpperCase(); }
  function badgesArr(b){ return Array.isArray(b) ? b : String(b||"").split(/[;,|]/).map(function(x){return x.trim()}).filter(Boolean); }

  function uniq(key){ var s={}; DATA.forEach(function(p){ if(p[key]) s[p[key]]=1; }); return Object.keys(s).sort(); }
  function uniqTeams(){ var s={}; DATA.forEach(function(p){ if(p.team) s[p.team]=1; });
    return Object.keys(s).sort(function(a,b){ return (parseInt(a.replace(/\D/g,""),10)||0)-(parseInt(b.replace(/\D/g,""),10)||0); }); }
  function fillSelect(id, vals){ var sel=document.getElementById(id); vals.forEach(function(v){ var o=document.createElement("option"); o.value=v; o.textContent=v; sel.appendChild(o); }); }

  function avatar(p, big){
    var cls = "avatar h-" + esc(p.house) + (big ? " big" : "");
    if (p.photo) return '<div class="'+cls+'"><img src="'+esc(p.photo)+'" alt="'+esc(p.pref||p.full)+'" loading="lazy"></div>';
    return '<div class="'+cls+'"><span>'+esc(initials(p.pref||p.full))+'</span></div>';
  }

  function card(p, i){
    return '<button class="dircard" data-i="'+i+'">' + avatar(p) +
      '<div class="dc-body">' +
        '<h3>'+esc(p.pref||p.full)+'</h3>' +
        '<span class="dc-house h-'+esc(p.house)+'">'+esc(HOUSES[p.house]||p.house)+'</span>' +
        '<p class="dc-uni">'+esc(p.uni)+'</p>' +
        '<p class="dc-meta">'+esc(p.field)+' · '+esc(p.state)+'</p>' +
        '<p class="dc-team">'+esc(p.team)+'</p>' +
      '</div></button>';
  }

  function render(list){
    var grid=document.getElementById("dir-grid");
    document.getElementById("dir-count").textContent = list.length + (list.length===1?" member":" members");
    document.getElementById("dir-empty").style.display = list.length ? "none" : "block";
    grid.innerHTML = list.map(function(p){ return card(p, DATA.indexOf(p)); }).join("");
    Array.prototype.forEach.call(grid.querySelectorAll(".dircard"), function(btn){
      btn.addEventListener("click", function(){ openModal(DATA[+btn.dataset.i]); });
    });
  }

  function applyFilters(){
    var q=(document.getElementById("f-search").value||"").toLowerCase().trim();
    var fh=document.getElementById("f-house").value, ft=document.getElementById("f-team").value,
        fu=document.getElementById("f-uni").value, fs=document.getElementById("f-state").value,
        ff=document.getElementById("f-field").value;
    render(DATA.filter(function(p){
      if(fh && p.house!==fh) return false;
      if(ft && p.team!==ft) return false;
      if(fu && p.uni!==fu) return false;
      if(fs && p.state!==fs) return false;
      if(ff && p.field!==ff) return false;
      if(q){
        var hay=[p.full,p.pref,p.uni,p.state,p.field,p.industries,p.askme,p.hobbies,p.roles,p.team].join(" ").toLowerCase();
        if(hay.indexOf(q)===-1) return false;
      }
      return true;
    }));
  }

  function row(label, val){ if(!val) return ""; return '<div class="pf-row"><span class="pf-k">'+esc(label)+'</span><span class="pf-v">'+esc(val)+'</span></div>'; }
  function openModal(p){
    var badges = badgesArr(p.badges);
    var html =
      '<button class="modal-x" data-close aria-label="Close">✕</button>' +
      '<div class="pf-head">' + avatar(p, true) +
        '<div><h2>'+esc(p.pref||p.full)+'</h2>' +
        '<p class="pf-full">'+esc(p.full)+'</p>' +
        '<span class="dc-house h-'+esc(p.house)+'">'+esc(HOUSES[p.house]||p.house)+'</span></div>' +
      '</div>' +
      (badges.length ? '<div class="pf-badges">'+badges.map(function(b){return '<span>🏅 '+esc(b)+'</span>'}).join("")+'</div>' : '') +
      '<div class="pf-grid">' +
        row("University", p.uni) + row("Home state", p.state) + row("Field of study", p.field) +
        row("Target industries", p.industries) + row("Team", p.team) + row("Bootcamp role", p.roles) +
        row("Personality", p.personality) +
      '</div>' +
      (p.askme ? '<div class="pf-block"><h4>Ask me about</h4><p>'+esc(p.askme)+'</p></div>' : '') +
      (p.hobbies ? '<div class="pf-block"><h4>Off-duty passions</h4><p>'+esc(p.hobbies)+'</p></div>' : '') +
      (p.social ? '<a class="btn btn-primary" href="'+esc(p.social)+'" target="_blank" rel="noopener">Connect <span class="arr">→</span></a>' : '');
    document.getElementById("modal-card").innerHTML = html;
    var m=document.getElementById("dir-modal");
    m.classList.add("open"); m.setAttribute("aria-hidden","false");
    document.body.style.overflow="hidden";
    Array.prototype.forEach.call(m.querySelectorAll("[data-close]"), function(el){ el.addEventListener("click", closeModal); });
  }
  function closeModal(){
    var m=document.getElementById("dir-modal");
    m.classList.remove("open"); m.setAttribute("aria-hidden","true");
    document.body.style.overflow="";
  }
  document.addEventListener("keydown", function(e){ if(e.key==="Escape") closeModal(); });

  function boot(data){
    DATA = data;
    var hs=document.getElementById("f-house"); hs.innerHTML='<option value="">All Houses</option>';
    Object.keys(HOUSES).forEach(function(h){ if(DATA.some(function(p){return p.house===h})){ var o=document.createElement("option"); o.value=h; o.textContent=HOUSES[h]; hs.appendChild(o);} });
    fillSelect("f-team", uniqTeams()); fillSelect("f-uni", uniq("uni")); fillSelect("f-state", uniq("state")); fillSelect("f-field", uniq("field"));
    ["f-search","f-house","f-team","f-uni","f-state","f-field"].forEach(function(id){
      document.getElementById(id).addEventListener("input", applyFilters);
      document.getElementById(id).addEventListener("change", applyFilters);
    });
    render(DATA);
  }

  function load(){
    if (ULDP.DIRECTORY_API_URL) {
      var tok = sessionStorage.getItem("uldp-member-token") || "";
      fetch(ULDP.DIRECTORY_API_URL + (ULDP.DIRECTORY_API_URL.indexOf("?")===-1?"?":"&") + "feed=directory&token=" + encodeURIComponent(tok), { cache:"no-store" })
        .then(function(r){ return r.json(); })
        .then(function(d){ boot((d && d.members && d.members.length) ? d.members : DEMO); })
        .catch(function(){ boot(DEMO); });
    } else { boot(DEMO); }
  }
  load();
})();
</script>
</body>
</html>
